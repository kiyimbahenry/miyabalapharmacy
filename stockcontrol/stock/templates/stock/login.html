<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Miyabala Pharmacy</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            padding: 40px 35px;
            transition: transform 0.2s;
        }
        .login-card:hover {
            transform: translateY(-4px);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-logo i {
            font-size: 3.5rem;
            color: #0b3b5c;
            background: #e6f0fa;
            padding: 20px;
            border-radius: 50%;
            display: inline-block;
        }
        .login-title {
            font-weight: 700;
            color: #0b3b5c;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.2rem;
        }
        .login-sub {
            text-align: center;
            color: #6c7a8a;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #dce3ed;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-control:focus {
            border-color: #0b3b5c;
            box-shadow: 0 0 0 4px rgba(11, 59, 92, 0.08);
        }
        .form-label {
            font-weight: 500;
            color: #2d3748;
        }
        .input-group-text {
            background: #f8fafc;
            border: 1px solid #dce3ed;
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #6c7a8a;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .btn-login {
            background: linear-gradient(135deg, #0b3b5c, #1a5d7a);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            color: white;
            width: 100%;
            transition: opacity 0.3s;
            margin-top: 8px;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .form-check-label {
            font-size: 0.9rem;
            color: #4a5568;
        }
        .forgot-link {
            color: #0b3b5c;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .login-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .alert {
            border-radius: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <i class="fas fa-capsules"></i>
            </div>
            <h2 class="login-title">Miyabala Pharmacy</h2>
            <p class="login-sub">Welcome back! Please log in to your account.</p>

            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <!-- Email / Username -->
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Email or Username" required>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Password" required>
                </div>

                <!-- Remember me & Forgot Password -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="{% url 'stock:password_reset' %}" class="forgot-link">
                        <i class="fas fa-key me-1"></i> Forgot Password?
                    </a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i> Login
                </button>
            </form>

            <div class="login-footer">
                &copy; 2026 Miyabala Pharmacy Management System
            </div>
        </div>
    </div>
</body>
</html>
