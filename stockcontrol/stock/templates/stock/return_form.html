{% extends 'stock/base.html' %}
{% load static %}

{% block title %}New Return{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow">
            <div class="card-header">
                <h4><i class="fas fa-undo-alt"></i> Record Return</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <!-- Receipt selection -->
                    <div class="mb-3">
                        <label class="form-label required-field">Receipt</label>
                        <select name="receipt" class="form-select" required>
                            <option value="">-- Select Receipt --</option>
                            {% for receipt in receipts %}
                                <option value="{{ receipt.id }}">
                                    {{ receipt.receipt_number }} - {{ receipt.created_at|date:"d/m/Y H:i" }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Drug autocomplete (AJAX) -->
                    <div class="mb-3" style="position: relative;">
                        <label class="form-label required-field">Drug</label>
                        <input type="text" 
                               id="drug_search" 
                               class="form-control" 
                               placeholder="Type brand or generic name..." 
                               autocomplete="off" 
                               required>
                        <input type="hidden" id="selected_drug_id" name="drug">
                        <div id="suggestions" style="position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ddd; border-radius: 4px; max-height: 250px; overflow-y: auto; z-index: 1000; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1);"></div>
                        <small class="text-muted">Start typing to search – select from suggestions.</small>
                    </div>

                    <!-- Quantity -->
                    <div class="mb-3">
                        <label class="form-label required-field">Quantity</label>
                        <input type="number" name="quantity" class="form-control" min="1" required>
                    </div>

                    <!-- Reason -->
                    <div class="mb-3">
                        <label class="form-label">Reason</label>
                        <textarea name="reason" class="form-control" rows="3" placeholder="Why is the drug being returned?"></textarea>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'stock:return_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Record Return
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- ====== JAVASCRIPT ====== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('drug_search');
    const suggestionsDiv = document.getElementById('suggestions');
    const hiddenDrugId = document.getElementById('selected_drug_id');

    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }

    function performSearch() {
        const query = searchInput.value.trim();
        if (query.length < 2) {
            suggestionsDiv.innerHTML = '';
            suggestionsDiv.style.display = 'none';
            return;
        }

        fetch(`/autocomplete-drugs/?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(drugs => {
                if (drugs.length === 0) {
                    suggestionsDiv.innerHTML = '<div class="suggestion-item" style="padding:10px;color:#999;">No drugs found</div>';
                    suggestionsDiv.style.display = 'block';
                    return;
                }

                let html = '';
                drugs.forEach(drug => {
                    const displayName = drug.brand || drug.name;
                    const generic = drug.generic_name || 'N/A';
                    const stock = drug.stock_quantity || 0;
                    html += `
                        <div class="suggestion-item" 
                             data-id="${drug.id}"
                             onclick="selectDrug(${drug.id}, '${displayName.replace(/'/g, "\\'")}')"
                             style="padding:10px 15px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background 0.2s;">
                            <div style="font-weight:500;">
                                ${displayName}
                                ${drug.brand ? '<span style="background:#007bff;color:white;padding:2px 8px;border-radius:12px;font-size:0.7rem;margin-left:8px;">BRAND</span>' : ''}
                            </div>
                            <div style="font-size:0.85rem;color:#666;">Generic: ${generic}</div>
                            <div style="font-size:0.8rem;color:#999;">Stock: ${stock} units</div>
                        </div>
                    `;
                });
                suggestionsDiv.innerHTML = html;
                suggestionsDiv.style.display = 'block';
            })
            .catch(err => {
                console.error('Autocomplete error:', err);
            });
    }

    const debouncedSearch = debounce(performSearch, 300);
    searchInput.addEventListener('input', debouncedSearch);

    // Hide suggestions on outside click
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#drug_search') && !e.target.closest('#suggestions')) {
            suggestionsDiv.style.display = 'none';
        }
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            suggestionsDiv.style.display = 'none';
        }
    });

    // Global function to select a drug
    window.selectDrug = function(id, displayName) {
        hiddenDrugId.value = id;
        searchInput.value = displayName;
        suggestionsDiv.innerHTML = '';
        suggestionsDiv.style.display = 'none';
    };

    // Form validation
    const form = document.querySelector('form');
    form.addEventListener('submit', function(e) {
        const drugId = hiddenDrugId.value;
        if (!drugId) {
            e.preventDefault();
            alert('Please select a valid drug from the suggestions.');
            searchInput.focus();
        }
        const receiptSelect = document.querySelector('select[name="receipt"]');
        if (!receiptSelect.value) {
            e.preventDefault();
            alert('Please select a receipt.');
            receiptSelect.focus();
        }
    });

    // Clear hidden when user clears the input
    searchInput.addEventListener('input', function() {
        if (this.value === '') {
            hiddenDrugId.value = '';
        }
    });
});
</script>

<!-- ====== STYLES ====== -->
<style>
    #suggestions .suggestion-item:hover {
        background: #f5f5f5;
    }
    #suggestions .suggestion-item:last-child {
        border-bottom: none;
    }
    .required-field::after {
        content: " *";
        color: red;
    }
</style>
{% endblock %}
