{% extends "stock/base.html" %}
{% block content %}
<div class="container">
    <div class="header">
        <h1>🗑️ Delete User</h1>
        <a href="{% url 'stock:user_list' %}" class="btn btn-secondary">← Back to Users</a>
    </div>
    
    <div class="card">
        <div class="card-body">
            <p>Are you sure you want to delete user <strong>"{{ user.username }}"</strong>?</p>
            <p class="text-danger">⚠️ This action cannot be undone!</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-danger">🗑️ Confirm Delete</button>
                    <a href="{% url 'stock:user_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
